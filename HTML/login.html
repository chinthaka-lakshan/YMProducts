<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YM Products</title>
    <link rel="stylesheet" href="login.css"> 
</head>
<body>
    <div class="full">
        <form action="">
            <h1>Welcome back!</h1>
            <h3>Enter your Credentials to access your account </h3>
            <h2>Email Address</h2>

            <div class="input-box">
                <input type="text" required>
            </div>
            <h2>Password</h2>

            <div class="input-box">
                <input type="text" required>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        
        <div class="logo-container">
            <img src="images.jpeg" alt="YM Products Logo">
        </div>
    </div>
</body>
</html>
